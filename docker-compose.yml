version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: slideforge
      POSTGRES_PASSWORD: slideforge
      POSTGRES_DB: slideforge
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-api:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_API_URL: http://api:3001/api/v1
      WORKER_API_KEY: internal-worker-secret
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: slideforge-uploads
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_FORCE_PATH_STYLE: "true"
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - minio

  worker-celery:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    command: >
      celery -A celery_app.celery_app worker
      --loglevel=info
      --queues=processing
      --concurrency=4
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_API_URL: http://api:3001/api/v1
      WORKER_API_KEY: internal-worker-secret
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: slideforge-uploads
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_FORCE_PATH_STYLE: "true"
    depends_on:
      - redis
      - minio

volumes:
  pg_data:
  minio_data:
