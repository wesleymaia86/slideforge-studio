name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: apps/api

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: slideforge_ci
          POSTGRES_PASSWORD: slideforge_ci
          POSTGRES_DB: slideforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slideforge_ci -d slideforge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://slideforge_ci:slideforge_ci@localhost:5432/slideforge_test
      REDIS_URL: redis://localhost:6379
      UAZAPI_BASE_URL: https://free.uazapi.dev
      UAZAPI_INSTANCE_TOKEN: test-token
      OPENROUTER_API_KEY: sk-or-test-key
      AI_AGENT_ENABLED: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
